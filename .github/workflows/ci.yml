name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  gates:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test -- --coverage

      - name: Upload coverage to Codecov
        # codecov-action v4+ dropped general tokenless uploading (it's
        # narrowly scoped to fork PRs against an already-connected upstream
        # OSS repo, which doesn't apply here), so this needs a real
        # `CODECOV_TOKEN` even though the repo is public — same as the
        # agent repo's convention. The operator has connected codecov.io to
        # this repo and added `CODECOV_TOKEN` as a repo secret, so
        # `fail_ci_if_error: true`: a broken upload should be visible (a
        # red `gates` check), not silently swallowed now that the
        # connection is expected to actually work.
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: true

  playwright:
    name: Playwright smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright boot smoke spec
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  snowflake-migrations:
    name: Snowflake migrations (offline)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      # No Snowflake connection here: schemachange render only parses Jinja
      # and prints SQL, it never opens a session. A live contract check
      # against ROASTPILOT_DEV with a CI-scoped key is deferred to the
      # human-gated secret-CI story (F1-S8/C7) per factory.md §8.
      - name: Install schemachange
        run: pip install -r snowflake/requirements.txt

      - name: Validate migration filenames + render
        run: python3 snowflake/validate_migrations.py
