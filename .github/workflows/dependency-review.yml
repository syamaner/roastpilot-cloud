name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write # to post the summary comment

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Dependency Review
        id: dependency-review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          # Codex P2 finding (round 1): the action defaults `fail-on-scopes`
          # to `runtime` only, so a vulnerable/denied-license
          # `devDependency` (this repo's CI installs and executes ALL
          # dependencies — `npm ci` then lint/typecheck/test — so a
          # dev-scoped one is a real CI supply-chain risk, not a
          # theoretical one) would pass this check silently. Explicit
          # `runtime, development` closed that gap.
          #
          # `unknown` (Codex P2 finding, round 2, verified against the v5
          # action source): `filterChangesByScopes` runs BEFORE the
          # severity/license checks, so a dependency whose scope isn't
          # resolved to `runtime` or `development` (an `unknown` scope is a
          # real, documented value the action can report) bypassed both
          # gates entirely until this was added — not a hypothetical, a
          # confirmed pre-filter step ahead of the checks this workflow
          # exists to run.
          fail-on-scopes: runtime, development, unknown
          comment-summary-in-pr: on-failure
          # This app has no LICENSE file / no `license` field in
          # package.json — it is proprietary (all rights reserved), not
          # OSS. Deny strong-copyleft licenses whose obligations are hardest
          # to reason about for a closed-source app; this list is a
          # starting judgment call for the lead to widen or narrow, not a
          # legal review.
          deny-licenses: >-
            GPL-1.0-only, GPL-1.0-or-later,
            GPL-2.0-only, GPL-2.0-or-later,
            GPL-3.0-only, GPL-3.0-or-later,
            AGPL-1.0-only, AGPL-1.0-or-later,
            AGPL-3.0-only, AGPL-3.0-or-later

      - name: Fail on undetected dependency licenses
        env:
          INVALID_LICENSE_CHANGES: ${{ steps.dependency-review.outputs.invalid-license-changes }}
        run: node --experimental-strip-types scripts/factory/check-unlicensed-dependencies.mts
