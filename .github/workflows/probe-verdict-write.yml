name: Probe Verdict Write Permission (diagnostic, dispatch-only)

# THROWAWAY DIAGNOSTIC — F1-S2 (#5), round 5. Empirically settles which
# --allowedTools rule actually lets claude-code-action's agent mode (the
# same mode triage-issues.yml uses) create triage-output/verdict.json,
# against the real Claude Agent SDK at the same pinned action SHA — static
# source reading gave two consecutive contradictory answers (round 4:
# Write(path) should work; round 5 Codex claim: Write(path) rules are
# accepted-but-never-matched, use Edit(path)), so this settles it by
# actually running it. workflow_dispatch only: never runs on an issue
# event, never sees untrusted issue content, exists purely to be dispatched
# manually with a candidate `allow_rule`. Delete once the real rule is
# confirmed and applied to triage-issues.yml.

on:
  workflow_dispatch:
    inputs:
      allow_rule:
        description: 'The --allowedTools rule to test, e.g. "Edit(triage-output/verdict.json)" or "Write(triage-output/verdict.json)" or bare "Write"'
        required: true
      pretouch:
        description: "Pre-create an empty triage-output/verdict.json before running the agent (tests whether the candidate rule needs the file to already exist)"
        type: boolean
        default: false

permissions: {}

jobs:
  probe:
    name: Probe write permission
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Prepare workspace
        run: |
          set -euo pipefail
          rm -rf triage-output
          mkdir -p triage-output
          if [ "${{ inputs.pretouch }}" = "true" ]; then
            : > triage-output/verdict.json
            echo "Pre-touched an empty triage-output/verdict.json"
          fi

      - name: Run agent with candidate allow rule
        id: agent
        uses: anthropics/claude-code-action@700e7f8316990de46bed556429765647af760efc # v1.0.176 — SAME pin as triage-issues.yml
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_bots: ""
          allowed_non_write_users: ""
          show_full_output: true
          # Exact same shape as triage-issues.yml's claude_args (candidate
          # allow rule + the standing FIX I .git denies), so this probe
          # also confirms the two don't interact badly.
          claude_args: '--allowedTools "${{ inputs.allow_rule }}" --disallowedTools "Bash,Read(.git/**),Grep(.git/**)"'
          prompt: |
            Write the exact text PROBE_OK_12345 (nothing else — no extra
            whitespace, no newline, no commentary) to the file
            triage-output/verdict.json using whichever file tool is
            available to you for that path. If every tool you try for
            that path is denied by your permission configuration, stop
            immediately — do not look for a workaround, do not try Bash
            (you don't have it), just stop and report that it was denied.

      - name: Check result
        run: |
          set -euo pipefail
          echo "--- triage-output/ listing ---"
          ls -la triage-output/ || true
          if [ -f triage-output/verdict.json ] && grep -q "PROBE_OK_12345" triage-output/verdict.json; then
            echo "PROBE RESULT: SUCCESS — file created/edited with expected content"
            echo "allow_rule=${{ inputs.allow_rule }} pretouch=${{ inputs.pretouch }}"
            cat triage-output/verdict.json
          else
            echo "PROBE RESULT: FAILURE — file missing or content mismatch"
            echo "allow_rule=${{ inputs.allow_rule }} pretouch=${{ inputs.pretouch }}"
            [ -f triage-output/verdict.json ] && cat triage-output/verdict.json || echo "(file does not exist)"
            exit 1
          fi
